name: RoadSoS X Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────
  #  Job 1: Backend Tests (Python / FastAPI)
  # ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        cache-dependency-path: backend-gateway/requirements.txt

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend-gateway/requirements.txt
        pip install pytest pytest-asyncio "httpx==0.25.2"

    - name: Run backend tests
      env:
        DATABASE_URL: "sqlite:///./test.db"
        JWT_SECRET: "ci_testing_secret_key"
      working-directory: .
      run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  #  Job 2: Dashboard Build (Next.js)
  # ─────────────────────────────────────────────
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: "npm"
        cache-dependency-path: dashboard/package-lock.json

    - name: Install dashboard dependencies
      working-directory: dashboard
      run: npm ci

    - name: Remove stale Next.js cache
      working-directory: dashboard
      run: rm -rf .next

    - name: Build Next.js dashboard
      working-directory: dashboard
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
        NEXT_PUBLIC_WS_URL: "ws://localhost:8000"
