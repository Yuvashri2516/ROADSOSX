name: RoadSoS X Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: roadsos
          POSTGRES_PASSWORD: roadsos_password
          POSTGRES_DB: roadsos_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend-gateway/requirements.txt
        pip install pytest httpx
    - name: Run Backend Tests
      env:
        DATABASE_URL: postgresql://roadsos:roadsos_password@localhost:5432/roadsos_db
        JWT_SECRET: testing_secret
      run: |
        pytest tests/

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
    - name: Install dependencies
      run: cd dashboard && npm ci
    - name: Build Next.js Dashboard
      run: cd dashboard && npm run build
