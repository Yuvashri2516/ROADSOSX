name: RoadSoS X CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Build Verification ────────────────────────
  lint-and-build:
    name: 🔍 Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            dashboard/package-lock.json
            mock-server/package-lock.json

      - name: 📦 Install Dashboard dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: 🔍 Lint Dashboard
        working-directory: ./dashboard
        run: npm run lint

      - name: 🏗️ Build Dashboard
        working-directory: ./dashboard
        run: npm run build

      - name: 📦 Install Mock Server dependencies
        working-directory: ./mock-server
        run: npm ci

      - name: ✅ Verify Mock Server
        working-directory: ./mock-server
        run: node -e "require('./server.js'); setTimeout(() => process.exit(0), 2000)"

  # ─── Docker Image Build ──────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Dashboard Image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: roadsos-x-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build Mock Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./mock-server
          push: false
          tags: roadsos-x-mock-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Verify Nginx Config
        run: |
          docker run --rm -v ${{ github.workspace }}/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro nginx:alpine nginx -t

  # ─── Deploy (main branch only) ───────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Production
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║     🚀 RoadSoS X — Deployment Ready         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║                                              ║"
          echo "║  To deploy, configure one of:                ║"
          echo "║                                              ║"
          echo "║  • Railway:  railway up                      ║"
          echo "║  • Render:   Push to connected repo          ║"
          echo "║  • AWS ECS:  Use aws ecs update-service      ║"
          echo "║                                              ║"
          echo "║  Add deployment secrets to GitHub:           ║"
          echo "║  • RAILWAY_TOKEN / RENDER_API_KEY            ║"
          echo "║  • AWS_ACCESS_KEY_ID / AWS_SECRET            ║"
          echo "║                                              ║"
          echo "╚══════════════════════════════════════════════╝"

  # ─── Health Check ────────────────────────────────────
  health-check:
    name: 🩺 Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🩺 Run Health Checks
        run: |
          echo "🩺 Health check pipeline ready."
          echo "Configure DEPLOY_URL secret to enable automated health checks."
          echo ""
          echo "Example health check:"
          echo "  curl -f \$DEPLOY_URL/api/health || exit 1"
          echo "  curl -f \$DEPLOY_URL/nginx-health || exit 1"
