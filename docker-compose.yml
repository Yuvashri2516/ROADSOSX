version: '3.8'

services:
  # Database: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: roadsos_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: roadsos
      POSTGRES_PASSWORD: roadsos_password
      POSTGRES_DB: roadsos_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # Backend Gateway
  backend:
    build:
      context: ./backend-gateway
      dockerfile: Dockerfile
    container_name: roadsos_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend-gateway:/app
      - ./emergency-engine:/emergency-engine
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://roadsos:roadsos_password@db:5432/roadsos_db
      - JWT_SECRET=supersecret_roadsos_key_2026
    depends_on:
      - db
    restart: unless-stopped

  # Web Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: roadsos_dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/telemetry
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
