version: '3.8'

services:
  # Member 4: Backend API & WebSocket Hub
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadsos_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./emergency-intelligence:/emergency-intelligence
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Member 6: Web Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: roadsos_dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/telemetry
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
